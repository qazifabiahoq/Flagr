services:
  - type: web
    name: flagr-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GOOGLE_PROJECT_ID
        sync: false
      - key: GOOGLE_LOCATION
        sync: false
      - key: VERTEX_AGENT_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: KAGGLE_USERNAME
        sync: false
      - key: KAGGLE_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
